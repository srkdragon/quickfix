name: Build Windows Static Library (No SSL)

on:
  workflow_dispatch:

jobs:
  build:
    name: no-ssl ${{ matrix.visual_studio.name }} ${{ matrix.arch.name }} ${{ matrix.configuration }} ${{ matrix.runtime.name }}
    runs-on: ${{ matrix.visual_studio.runner }}
    strategy:
      fail-fast: false
      matrix:
        visual_studio:
          - name: vs2022
            runner: windows-2022
            generator: Visual Studio 17 2022
          - name: vs2026
            runner: windows-2025-vs2026
            generator: Visual Studio 18 2026
        arch:
          - name: x86
            cmake_arch: Win32
          - name: x64
            cmake_arch: x64
        configuration: [Debug, Release]
        runtime:
          - name: MD
            static_runtime: OFF
          - name: MT
            static_runtime: ON

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        shell: pwsh
        run: >
          cmake
          -S .
          -B build
          -G "${{ matrix.visual_studio.generator }}"
          -A "${{ matrix.arch.cmake_arch }}"
          -DHAVE_SSL=OFF
          -DQUICKFIX_EXAMPLES=OFF
          -DQUICKFIX_TESTS=OFF
          -DQUICKFIX_SHARED_LIBS=OFF
          -DSTATIC_RUNTIME=${{ matrix.runtime.static_runtime }}
          -DQUICKFIX_LIB_OUTPUT_DIR="${{ github.workspace }}\build-output\lib"

      - name: Build
        run: cmake --build build --config ${{ matrix.configuration }} --target quickfix --parallel

      - name: Install
        run: cmake --install build --config ${{ matrix.configuration }} --prefix package

      - name: Write build metadata
        shell: pwsh
        run: |
          @(
            "quickfix static library"
            "ssl=OFF"
            "os=windows"
            "toolset=${{ matrix.visual_studio.name }}"
            "cmake_generator=${{ matrix.visual_studio.generator }}"
            "arch=${{ matrix.arch.name }}"
            "configuration=${{ matrix.configuration }}"
            "runtime=${{ matrix.runtime.name }}"
          ) | Set-Content -Path package\build-info.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quickfix-windows-no-ssl-${{ matrix.visual_studio.name }}-${{ matrix.arch.name }}-${{ matrix.configuration }}-${{ matrix.runtime.name }}
          path: package
          if-no-files-found: error
